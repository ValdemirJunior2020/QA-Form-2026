<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Form 2026</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e3a8a, #0284c7);
      }

      #root {
        min-height: 100vh;
      }

      .html-first-loader {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: white;
        text-align: center;
      }

      .html-first-loader-card {
        width: min(520px, 92vw);
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(12px);
      }

      .html-first-loader-card img {
        width: min(320px, 100%);
        border-radius: 22px;
        margin-bottom: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      .html-first-loader-card h1 {
        font-size: 30px;
        margin: 0 0 12px;
      }

      .html-first-loader-card p {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        color: #dbeafe;
      }

      .html-dots {
        display: inline-flex;
        gap: 6px;
        margin-top: 22px;
      }

      .html-dots span {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: white;
        animation: bounce 0.9s infinite alternate;
      }

      .html-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .html-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes bounce {
        from {
          opacity: 0.35;
          transform: translateY(0);
        }
        to {
          opacity: 1;
          transform: translateY(-10px);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="html-first-loader">
        <div class="html-first-loader-card">
          <img
            src="https://media1.tenor.com/m/IavKWJp8FJEAAAAC/meme-coffee.gif"
            alt="Loading QA app"
          />
          <h1>Loading QA Form...</h1>
          <p>Brewing the QA scores before the meeting starts...</p>
          <div class="html-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
